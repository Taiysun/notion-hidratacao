<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidrate-se</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Hidrate-se</h1>

    <div class="linha">
        <label for="meta">Nova meta:</label>

        <input
            id="meta"
            type="number"
            inputmode="numeric"
            min="0"
            placeholder="3000">

        <button id="salvarMeta">✓</button>
    </div>

    <div class="linha">

        <span>+</span>

        <input
            id="consumo"
            type="number"
            inputmode="numeric"
            min="0"
            placeholder="250">

        <span>ml</span>

        <button id="adicionar">✓</button>

    </div>

    <div id="contador">
        0/0ml
    </div>

    <button id="reiniciar">
        Reiniciar consumo
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
